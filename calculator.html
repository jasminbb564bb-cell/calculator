<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミニマム電卓</title>
  <style>
    :root {
      --page-bg: #f5f6f1;
      --card-bg: #ffffff;
      --card-border: #d7ddd2;
      --space-purple: transparent;
      --space-pink: transparent;
      --space-blue: transparent;
      --space-star: rgba(38, 49, 42, 0.12);
      --display-bg: #151511;
      --display-line: #2f332d;
      --display-main: #ffffff;
      --display-sub: #b8b2a6;
      --number-bg: #f3f5ef;
      --number-text: #181814;
      --number-top-light: rgba(255, 255, 255, 0.72);
      --number-depth: rgba(30, 30, 24, 0.12);
      --display-number-depth: rgba(255, 255, 255, 0.12);
      --operator-bg: #e1e7dc;
      --operator-text: #181814;
      --equal-bg: #23352a;
      --equal-text: #ffffff;
      --clear-bg: #1a1a16;
      --clear-text: #ffffff;
      --tax-bg: #d8e0d2;
      --tax-text: #1a241d;
      --history-bg: #eef2ea;
      --history-border: #d7ddd2;
      --currency-bg: #f5f6f1;
      --currency-border: #d7ddd2;
      --currency-field-bg: #ffffff;
      --muted-text: #4c4d47;
      --button-shadow: rgba(30, 30, 24, 0.16);
      --focus-ring: #6b7b66;
      --star-color: #ffffff;
      --star-accent: #8a9a80;
      --press-star: #23352a;
      --press-star-muted: rgba(107, 123, 102, 0.42);
      --danger-color: #9a4f45;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--page-bg);
      color: var(--number-text);
      font-family: "Yu Gothic", YuGothic, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    .calculator {
      width: min(100%, 560px);
      max-height: calc(100vh - 40px);
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 22px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-bg);
      box-shadow: 0 18px 42px rgba(43, 39, 31, 0.12);
    }

    .calculator::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 1px solid rgba(38, 49, 42, 0.04);
      opacity: 1;
    }

    .calculator > * {
      position: relative;
      z-index: 1;
    }

    .display {
      min-height: 112px;
      position: relative;
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 16px;
      padding: 18px 20px;
      border-radius: 8px;
      border: 1px solid var(--display-line);
      background: var(--display-bg);
      text-align: right;
      overflow: hidden;
    }

    .expression {
      position: relative;
      z-index: 1;
      min-height: 22px;
      color: var(--display-sub);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.3;
      word-break: break-all;
    }

    .result {
      position: relative;
      z-index: 1;
      color: var(--display-main);
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.06),
        0 10px 18px var(--display-number-depth);
      word-break: break-all;
    }

    .copy-result {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 3;
      display: grid;
      width: 36px;
      min-height: 36px;
      place-items: center;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
    }

    .copy-result:hover {
      filter: brightness(1.12);
    }

    .copy-symbol {
      position: relative;
      width: 17px;
      height: 18px;
    }

    .copy-symbol::before,
    .copy-symbol::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 12px;
      border: 2px solid currentColor;
      border-radius: 3px;
    }

    .copy-symbol::before {
      top: 1px;
      left: 1px;
      opacity: 0.52;
    }

    .copy-symbol::after {
      right: 1px;
      bottom: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .copy-toast {
      position: absolute;
      top: 15px;
      left: 56px;
      z-index: 3;
      max-width: calc(100% - 76px);
      padding: 6px 9px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--display-main);
      font-size: 0.72rem;
      font-weight: 700;
      line-height: 1.2;
      opacity: 0;
      overflow: hidden;
      text-align: left;
      text-overflow: ellipsis;
      transform: translateY(-4px);
      transition: opacity 160ms ease, transform 160ms ease;
      white-space: nowrap;
    }

    .copy-toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .copy-toast.is-error {
      border-color: rgba(154, 79, 69, 0.5);
      color: #f0d4cf;
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      top: 64%;
      left: 50%;
      width: 13px;
      height: 13px;
      color: var(--star-color);
      opacity: 0;
      filter: drop-shadow(0 0 10px var(--star-accent));
      animation: star-pop 900ms ease-out forwards;
    }

    .star.accent {
      color: var(--star-accent);
    }

    .star::before {
      content: "";
      position: absolute;
      inset: 0;
      background: currentColor;
      clip-path: polygon(50% 0, 58% 38%, 100% 50%, 58% 62%, 50% 100%, 42% 62%, 0 50%, 42% 38%);
    }

    @keyframes star-pop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4) rotate(0deg);
      }

      22% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(var(--star-x), var(--star-y)) scale(1.18) rotate(24deg);
      }
    }

    .press-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      overflow: hidden;
      pointer-events: none;
    }

    .press-burst {
      position: absolute;
      width: 76px;
      height: 76px;
      opacity: 0;
      filter: drop-shadow(0 10px 16px rgba(43, 39, 31, 0.12));
      transform: translate(-50%, -50%) scale(0.8);
      animation: press-burst 660ms cubic-bezier(0.2, 0.82, 0.2, 1) forwards;
    }

    .press-starlet {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--star-size);
      height: var(--star-size);
      color: var(--press-star);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.48) rotate(var(--star-rotation));
      animation: press-starlet 680ms cubic-bezier(0.2, 0.82, 0.2, 1) forwards;
      animation-delay: var(--star-delay);
    }

    .press-starlet.is-muted {
      color: var(--press-star-muted);
    }

    .press-starlet::before {
      content: "";
      position: absolute;
      inset: 0;
      background: currentColor;
      clip-path: polygon(50% 0, 58% 38%, 100% 50%, 58% 62%, 50% 100%, 42% 62%, 0 50%, 42% 38%);
    }

    @keyframes press-burst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.72) rotate(-4deg);
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -62%) scale(1) rotate(6deg);
      }
    }

    @keyframes press-starlet {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.42) rotate(var(--star-rotation));
      }

      22% {
        opacity: 0.94;
      }

      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--star-x)), calc(-50% + var(--star-y))) scale(0.9) rotate(calc(var(--star-rotation) + 26deg));
      }
    }

    .buttons {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 11px;
    }

    button {
      min-height: 54px;
      border: 0;
      border-radius: 8px;
      box-shadow: 0 3px 0 var(--button-shadow);
      cursor: pointer;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
      touch-action: manipulation;
    }

    button:hover {
      filter: brightness(0.98);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 var(--button-shadow);
    }

    button:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .number {
      background: var(--number-bg);
      color: var(--number-text);
      text-shadow:
        0 1px 0 var(--number-top-light),
        0 6px 14px var(--number-depth);
    }

    .operator {
      background: var(--operator-bg);
      color: var(--operator-text);
    }

    .equal {
      grid-column: span 1;
      background: var(--equal-bg);
      color: var(--equal-text);
    }

    .clear {
      background: var(--clear-bg);
      color: var(--clear-text);
    }

    .tax {
      background: var(--tax-bg);
      color: var(--tax-text);
      font-size: 1rem;
    }

    .zero {
      grid-column: span 2;
    }

    .utility-scroll {
      flex: 1 1 auto;
      min-height: 0;
      max-height: clamp(180px, 30vh, 280px);
      margin-top: 14px;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-color: #9faa99 transparent;
      scrollbar-width: thin;
    }

    .utility-scroll::-webkit-scrollbar {
      width: 7px;
    }

    .utility-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .utility-scroll::-webkit-scrollbar-thumb {
      border: 2px solid var(--card-bg);
      border-radius: 999px;
      background: #9faa99;
    }

    .utility-scroll .currency {
      margin-top: 0;
    }

    .currency {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--currency-border);
      border-radius: 8px;
      background: var(--currency-bg);
    }

    .currency-title {
      margin: 0 0 10px;
      color: var(--muted-text);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .currency-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 8px;
      align-items: end;
    }

    .currency-field {
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 6px;
    }

    .currency-field label {
      color: var(--display-sub);
      font-size: 0.72rem;
      font-weight: 700;
    }

    .currency-select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--display-line);
      border-radius: 8px;
      background: var(--currency-field-bg);
      color: var(--number-text);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0;
      padding: 0 10px;
    }

    .currency-swap,
    .currency-convert {
      min-height: 42px;
      font-size: 0.86rem;
    }

    .currency-swap {
      padding: 0 14px;
      background: var(--operator-bg);
      color: var(--operator-text);
    }

    .currency-convert {
      width: 100%;
      margin-top: 8px;
      background: var(--equal-bg);
      color: var(--equal-text);
    }

    .currency-rate {
      margin: 8px 0 0;
      color: var(--display-sub);
      font-size: 0.7rem;
      line-height: 1.35;
    }

    .travel {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--currency-border);
      border-radius: 8px;
      background: var(--currency-bg);
    }

    .travel-title {
      margin: 0 0 10px;
      color: var(--muted-text);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .travel-tool {
      display: grid;
      gap: 9px;
      padding: 10px 0;
    }

    .travel-tool:first-of-type {
      padding-top: 0;
    }

    .travel-tool + .travel-tool {
      border-top: 1px solid var(--currency-border);
    }

    .travel-tool-title {
      margin: 0;
      color: var(--number-text);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .travel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-items: end;
    }

    .travel-grid.single {
      grid-template-columns: minmax(0, 1fr);
    }

    .travel-field {
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 6px;
    }

    .travel-field label {
      color: var(--display-sub);
      font-size: 0.72rem;
      font-weight: 700;
    }

    .travel-input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--display-line);
      border-radius: 8px;
      background: var(--currency-field-bg);
      color: var(--number-text);
      font: inherit;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0;
      padding: 0 10px;
    }

    .travel-action {
      width: 100%;
      min-height: 42px;
      background: var(--equal-bg);
      color: var(--equal-text);
      font-size: 0.86rem;
    }

    .travel-result {
      min-height: 30px;
      padding: 7px 9px;
      border-radius: 8px;
      background: var(--currency-field-bg);
      color: var(--number-text);
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-all;
    }

    .baggage-summary {
      display: grid;
      gap: 6px;
    }

    .baggage-meter {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #d7ddd2;
    }

    .baggage-fill {
      width: 86%;
      height: 100%;
      border-radius: inherit;
      background: var(--equal-bg);
      transition: width 180ms ease, background 180ms ease;
    }

    .baggage-fill.is-over {
      background: var(--danger-color);
    }

    .history {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--history-border);
      border-radius: 8px;
      background: var(--history-bg);
    }

    .history-title {
      margin: 0 0 8px;
      color: var(--muted-text);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 116px;
      overflow-y: auto;
    }

    .history-item {
      min-height: 24px;
      color: var(--number-text);
      font-size: 0.82rem;
      line-height: 1.35;
      word-break: break-all;
    }

    .history-empty {
      color: var(--muted-text);
    }

    @media (max-width: 380px) {
      body {
        padding: 12px;
      }

      .calculator {
        max-height: calc(100vh - 24px);
        padding: 14px;
      }

      .buttons {
        gap: 8px;
      }

      .currency-grid {
        grid-template-columns: 1fr;
      }

      .travel-grid {
        grid-template-columns: 1fr;
      }

      .currency-swap {
        width: 100%;
      }

      button {
        min-height: 52px;
        font-size: 1.08rem;
      }

      .tax {
        font-size: 0.92rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .press-burst,
      .press-starlet {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="電卓">
    <section class="display" aria-live="polite">
      <button id="copyResultButton" class="copy-result" type="button" onclick="copyDisplayValue()" aria-label="計算結果をコピー" title="計算結果をコピー">
        <span class="copy-symbol" aria-hidden="true"></span>
      </button>
      <div id="copyToast" class="copy-toast" role="status" aria-live="polite"></div>
      <div id="expression" class="expression">計算式</div>
      <div id="display" class="result">0</div>
      <div id="stars" class="stars" aria-hidden="true"></div>
    </section>

    <div class="buttons">
      <button class="clear" type="button" onclick="clearAll()" aria-label="クリア">C</button>
      <button class="tax" type="button" onclick="handleTax('include')" aria-label="税込み">税込</button>
      <button class="tax" type="button" onclick="handleTax('exclude')" aria-label="税抜き">税抜</button>
      <button class="operator" type="button" onclick="handleOperator('÷')" aria-label="割り算">÷</button>

      <button class="number" type="button" onclick="handleNumber('7')">7</button>
      <button class="number" type="button" onclick="handleNumber('8')">8</button>
      <button class="number" type="button" onclick="handleNumber('9')">9</button>
      <button class="operator" type="button" onclick="handleOperator('×')" aria-label="掛け算">×</button>

      <button class="number" type="button" onclick="handleNumber('4')">4</button>
      <button class="number" type="button" onclick="handleNumber('5')">5</button>
      <button class="number" type="button" onclick="handleNumber('6')">6</button>
      <button class="operator" type="button" onclick="handleOperator('ー')" aria-label="引き算">ー</button>

      <button class="number" type="button" onclick="handleNumber('1')">1</button>
      <button class="number" type="button" onclick="handleNumber('2')">2</button>
      <button class="number" type="button" onclick="handleNumber('3')">3</button>
      <button class="operator" type="button" onclick="handleOperator('＋')" aria-label="足し算">＋</button>

      <button class="number zero" type="button" onclick="handleNumber('0')">0</button>
      <button class="number" type="button" onclick="handleNumber('.')">.</button>
      <button class="equal" type="button" onclick="calculate()" aria-label="計算する">=</button>
    </div>

    <div class="utility-scroll" aria-label="追加機能">
      <section class="currency" aria-label="通貨変換">
        <p class="currency-title">通貨変換</p>
        <div class="currency-grid">
          <div class="currency-field">
            <label for="fromCurrency">変換元</label>
            <select id="fromCurrency" class="currency-select">
              <option value="JPY" selected>JPY 日本円</option>
              <option value="USD">USD 米ドル</option>
              <option value="EUR">EUR ユーロ</option>
              <option value="GBP">GBP 英ポンド</option>
              <option value="CNY">CNY 人民元</option>
              <option value="KRW">KRW 韓国ウォン</option>
              <option value="AUD">AUD 豪ドル</option>
              <option value="CAD">CAD カナダドル</option>
              <option value="CHF">CHF スイスフラン</option>
              <option value="HKD">HKD 香港ドル</option>
              <option value="SGD">SGD シンガポールドル</option>
              <option value="THB">THB タイバーツ</option>
              <option value="TWD">TWD 台湾ドル</option>
              <option value="INR">INR インドルピー</option>
              <option value="BRL">BRL ブラジルレアル</option>
              <option value="MXN">MXN メキシコペソ</option>
              <option value="NZD">NZD NZドル</option>
            </select>
          </div>

          <button class="currency-swap" type="button" onclick="swapCurrencies()" aria-label="通貨を入れ替え">⇄</button>

          <div class="currency-field">
            <label for="toCurrency">変換先</label>
            <select id="toCurrency" class="currency-select">
              <option value="JPY">JPY 日本円</option>
              <option value="USD" selected>USD 米ドル</option>
              <option value="EUR">EUR ユーロ</option>
              <option value="GBP">GBP 英ポンド</option>
              <option value="CNY">CNY 人民元</option>
              <option value="KRW">KRW 韓国ウォン</option>
              <option value="AUD">AUD 豪ドル</option>
              <option value="CAD">CAD カナダドル</option>
              <option value="CHF">CHF スイスフラン</option>
              <option value="HKD">HKD 香港ドル</option>
              <option value="SGD">SGD シンガポールドル</option>
              <option value="THB">THB タイバーツ</option>
              <option value="TWD">TWD 台湾ドル</option>
              <option value="INR">INR インドルピー</option>
              <option value="BRL">BRL ブラジルレアル</option>
              <option value="MXN">MXN メキシコペソ</option>
              <option value="NZD">NZD NZドル</option>
            </select>
          </div>
        </div>
        <button class="currency-convert" type="button" onclick="convertCurrency()">変換</button>
        <p class="currency-rate">2026-06-17 更新のUSD基準レートを使用</p>
      </section>

      <section class="travel" aria-label="旅行ツール">
        <p class="travel-title">旅行ツール</p>

        <div class="travel-tool">
          <p class="travel-tool-title">年齢計算</p>
          <div class="travel-grid">
            <div class="travel-field">
              <label for="birthdayInput">誕生日</label>
              <input id="birthdayInput" class="travel-input" type="date">
            </div>
            <button class="travel-action" type="button" onclick="calculateAge()">計算</button>
          </div>
          <div id="ageResult" class="travel-result" aria-live="polite">誕生日を入力</div>
        </div>

        <div class="travel-tool">
          <p class="travel-tool-title">時間計算</p>
          <div class="travel-grid">
            <div class="travel-field">
              <label for="startTimeInput">開始</label>
              <input id="startTimeInput" class="travel-input" type="time">
            </div>
            <div class="travel-field">
              <label for="endTimeInput">終了</label>
              <input id="endTimeInput" class="travel-input" type="time">
            </div>
          </div>
          <button class="travel-action" type="button" onclick="calculateTravelTime()">時間を計算</button>
          <div id="timeResult" class="travel-result" aria-live="polite">0時間0分</div>
        </div>

        <div class="travel-tool">
          <p class="travel-tool-title">預け荷物</p>
          <div class="travel-grid">
            <div class="travel-field">
              <label for="baggageLimitInput">制限 kg</label>
              <input id="baggageLimitInput" class="travel-input" type="number" min="0" step="0.1" value="23">
            </div>
            <div class="travel-field">
              <label for="baggageCurrentInput">現在 kg</label>
              <input id="baggageCurrentInput" class="travel-input" type="number" min="0" step="0.1" value="19.8">
            </div>
          </div>
          <button class="travel-action" type="button" onclick="calculateBaggage()">残りを計算</button>
          <div class="baggage-summary">
            <div id="baggageResult" class="travel-result" aria-live="polite">制限: 23kg / 現在: 19.8kg / 残り: 3.2kg</div>
            <div class="baggage-meter" aria-hidden="true">
              <div id="baggageFill" class="baggage-fill"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="history" aria-label="計算履歴">
        <p class="history-title">計算履歴</p>
        <div id="historyList" class="history-list">
          <div class="history-item history-empty">まだ履歴はありません</div>
        </div>
      </section>
    </div>
    <div id="pressLayer" class="press-layer" aria-hidden="true"></div>
  </main>

  <script>
    const calculator = document.querySelector(".calculator");
    const display = document.getElementById("display");
    const expression = document.getElementById("expression");
    const historyList = document.getElementById("historyList");
    const stars = document.getElementById("stars");
    const pressLayer = document.getElementById("pressLayer");
    const copyToast = document.getElementById("copyToast");
    const fromCurrency = document.getElementById("fromCurrency");
    const toCurrency = document.getElementById("toCurrency");
    const birthdayInput = document.getElementById("birthdayInput");
    const ageResult = document.getElementById("ageResult");
    const startTimeInput = document.getElementById("startTimeInput");
    const endTimeInput = document.getElementById("endTimeInput");
    const timeResult = document.getElementById("timeResult");
    const baggageLimitInput = document.getElementById("baggageLimitInput");
    const baggageCurrentInput = document.getElementById("baggageCurrentInput");
    const baggageResult = document.getElementById("baggageResult");
    const baggageFill = document.getElementById("baggageFill");
    const taxRate = 0.1;

    let firstNumber = null;
    let operator = null;
    let isNewInput = true;
    let historyCount = 0;
    let copyToastTimer = null;

    const currencyRates = {
      USD: 1,
      JPY: 160.357421,
      EUR: 0.861314,
      GBP: 0.744885,
      CNY: 6.769763,
      KRW: 1508.825189,
      AUD: 1.414641,
      CAD: 1.399083,
      CHF: 0.793474,
      HKD: 7.83281,
      SGD: 1.281946,
      THB: 32.515566,
      TWD: 31.553811,
      INR: 94.617681,
      BRL: 5.067231,
      MXN: 17.205389,
      NZD: 1.714444
    };

    const currencyDecimals = {
      JPY: 0,
      KRW: 0
    };

    function formatNumber(value) {
      return Number.isInteger(value) ? String(value) : String(parseFloat(value.toFixed(10)));
    }

    function formatCurrencyResult(value, currencyCode) {
      const digits = currencyDecimals[currencyCode] ?? 2;
      return String(parseFloat(value.toFixed(digits)));
    }

    function formatKg(value) {
      return String(parseFloat(value.toFixed(1)));
    }

    function parseDateInput(value) {
      const parts = value.split("-").map(Number);

      if (parts.length !== 3 || parts.some(Number.isNaN)) {
        return null;
      }

      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function calculateAge() {
      const birthday = parseDateInput(birthdayInput.value);

      if (!birthday) {
        ageResult.textContent = "誕生日を入力";
        return;
      }

      const today = new Date();
      const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());

      if (birthday > todayDate) {
        ageResult.textContent = "未来の日付です";
        return;
      }

      let age = todayDate.getFullYear() - birthday.getFullYear();
      let nextBirthday = new Date(todayDate.getFullYear(), birthday.getMonth(), birthday.getDate());

      if (todayDate < nextBirthday) {
        age -= 1;
      } else {
        nextBirthday = new Date(todayDate.getFullYear() + 1, birthday.getMonth(), birthday.getDate());
      }

      const daysUntilBirthday = Math.ceil((nextBirthday - todayDate) / 86400000);
      const detail = daysUntilBirthday === 365 || daysUntilBirthday === 366
        ? "今日が誕生日"
        : "次の誕生日まで" + daysUntilBirthday + "日";

      ageResult.textContent = "満" + age + "歳 / " + detail;
      addHistory("年齢計算: " + ageResult.textContent);
      showStars();
    }

    function parseTimeInput(value) {
      const parts = value.split(":").map(Number);

      if (parts.length !== 2 || parts.some(Number.isNaN)) {
        return null;
      }

      return parts[0] * 60 + parts[1];
    }

    function calculateTravelTime() {
      const startMinutes = parseTimeInput(startTimeInput.value);
      const endMinutes = parseTimeInput(endTimeInput.value);

      if (startMinutes === null || endMinutes === null) {
        timeResult.textContent = "開始と終了を入力";
        return;
      }

      let diff = endMinutes - startMinutes;
      const isNextDay = diff < 0;

      if (isNextDay) {
        diff += 24 * 60;
      }

      const hours = Math.floor(diff / 60);
      const minutes = diff % 60;
      const suffix = isNextDay ? " / 翌日着" : "";

      timeResult.textContent = hours + "時間" + minutes + "分" + suffix;
      addHistory("時間計算: " + timeResult.textContent);
      showStars();
    }

    function calculateBaggage(shouldRecord) {
      const limit = parseFloat(baggageLimitInput.value);
      const current = parseFloat(baggageCurrentInput.value);

      if (Number.isNaN(limit) || Number.isNaN(current) || limit <= 0 || current < 0) {
        baggageResult.textContent = "kgを入力";
        baggageFill.style.width = "0%";
        baggageFill.classList.remove("is-over");
        return;
      }

      const remaining = limit - current;
      const percent = Math.min(Math.max((current / limit) * 100, 0), 100);
      const status = remaining >= 0
        ? "残り: " + formatKg(remaining) + "kg"
        : "超過: " + formatKg(Math.abs(remaining)) + "kg";

      baggageResult.textContent = "制限: " + formatKg(limit) + "kg / 現在: " + formatKg(current) + "kg / " + status;
      baggageFill.style.width = percent + "%";
      baggageFill.classList.toggle("is-over", remaining < 0);

      if (shouldRecord !== false) {
        addHistory("預け荷物: " + status);
        showStars();
      }
    }

    function showPressStars(source) {
      if (!calculator || !pressLayer || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        return;
      }

      const calculatorRect = calculator.getBoundingClientRect();
      const sourceRect = source.getBoundingClientRect();
      const centerX = sourceRect.left + sourceRect.width / 2 - calculatorRect.left;
      const centerY = sourceRect.top + sourceRect.height / 2 - calculatorRect.top;
      const x = Math.min(Math.max(centerX, 42), calculatorRect.width - 42);
      const y = Math.min(Math.max(centerY, 56), calculatorRect.height - 42);
      const burst = document.createElement("span");
      const starlets = [
        ["-18px", "-22px", "14px", "0ms", "0deg", false],
        ["14px", "-26px", "10px", "55ms", "16deg", true],
        ["26px", "-2px", "12px", "95ms", "38deg", false],
        ["-24px", "5px", "9px", "75ms", "-18deg", true],
        ["3px", "20px", "8px", "115ms", "24deg", true]
      ];

      burst.className = "press-burst";
      burst.style.left = x + "px";
      burst.style.top = y + "px";

      starlets.forEach(function(settings) {
        const starlet = document.createElement("span");
        starlet.className = settings[5] ? "press-starlet is-muted" : "press-starlet";
        starlet.style.setProperty("--star-x", settings[0]);
        starlet.style.setProperty("--star-y", settings[1]);
        starlet.style.setProperty("--star-size", settings[2]);
        starlet.style.setProperty("--star-delay", settings[3]);
        starlet.style.setProperty("--star-rotation", settings[4]);
        burst.appendChild(starlet);
      });

      pressLayer.appendChild(burst);

      window.setTimeout(function() {
        burst.remove();
      }, 820);
    }

    function showCopyMessage(message, isError) {
      copyToast.textContent = message;
      copyToast.classList.toggle("is-error", isError);
      copyToast.classList.remove("is-visible");
      void copyToast.offsetWidth;
      copyToast.classList.add("is-visible");

      window.clearTimeout(copyToastTimer);
      copyToastTimer = window.setTimeout(function() {
        copyToast.classList.remove("is-visible");
      }, 1300);
    }

    function writeClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }

      return new Promise(function(resolve, reject) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.setAttribute("readonly", "");
        textArea.style.position = "fixed";
        textArea.style.top = "-1000px";
        textArea.style.left = "-1000px";
        document.body.appendChild(textArea);
        textArea.select();

        try {
          if (document.execCommand("copy")) {
            resolve();
          } else {
            reject(new Error("Copy command failed"));
          }
        } catch (error) {
          reject(error);
        } finally {
          textArea.remove();
        }
      });
    }

    function copyDisplayValue() {
      const value = display.textContent.trim();

      if (!value || value === "エラー") {
        showCopyMessage("コピーできません", true);
        return;
      }

      writeClipboard(value)
        .then(function() {
          showCopyMessage("コピーしました", false);
        })
        .catch(function() {
          showCopyMessage("コピー失敗", true);
        });
    }

    function showStars() {
      const positions = [
        ["-132px", "-38px"],
        ["-92px", "-76px"],
        ["-42px", "-44px"],
        ["18px", "-86px"],
        ["70px", "-48px"],
        ["122px", "-78px"],
        ["6px", "-28px"]
      ];

      stars.textContent = "";

      positions.forEach(function(position, index) {
        const star = document.createElement("span");
        star.className = index % 2 === 0 ? "star accent" : "star";
        star.style.setProperty("--star-x", position[0]);
        star.style.setProperty("--star-y", position[1]);
        star.style.animationDelay = index * 45 + "ms";
        stars.appendChild(star);
      });

      window.setTimeout(function() {
        stars.textContent = "";
      }, 1200);
    }

    function addHistory(text) {
      historyCount += 1;
      const heart = historyCount % 3 === 0 ? " ♡" : "";
      const item = document.createElement("div");
      item.className = "history-item";
      item.textContent = text + heart;

      if (historyList.querySelector(".history-empty")) {
        historyList.textContent = "";
      }

      historyList.prepend(item);

      while (historyList.children.length > 5) {
        historyList.removeChild(historyList.lastElementChild);
      }
    }

    function updateExpression() {
      if (firstNumber !== null && operator) {
        expression.textContent = isNewInput
          ? firstNumber + " " + operator
          : firstNumber + " " + operator + " " + display.textContent;
      } else {
        expression.textContent = display.textContent === "0" ? "計算式" : display.textContent;
      }
    }

    function handleNumber(number) {
      if (display.textContent === "エラー") {
        clearAll();
      }

      if (isNewInput) {
        display.textContent = number === "." ? "0." : number;
        isNewInput = false;
      } else if (number === "." && display.textContent.includes(".")) {
        return;
      } else if (display.textContent === "0" && number !== ".") {
        display.textContent = number;
      } else {
        display.textContent += number;
      }

      updateExpression();
    }

    function handleOperator(selectedOperator) {
      if (display.textContent === "エラー") {
        clearAll();
        return;
      }

      if (firstNumber !== null && operator && !isNewInput) {
        calculate();
      }

      firstNumber = display.textContent;
      operator = selectedOperator;
      isNewInput = true;
      updateExpression();
    }

    function calculate() {
      if (firstNumber === null || operator === null || isNewInput) {
        return;
      }

      const secondNumber = display.textContent;
      const a = parseFloat(firstNumber);
      const b = parseFloat(secondNumber);
      let result;

      if (operator === "＋") {
        result = a + b;
      } else if (operator === "ー") {
        result = a - b;
      } else if (operator === "×") {
        result = a * b;
      } else if (operator === "÷") {
        if (b === 0) {
          display.textContent = "エラー";
          expression.textContent = firstNumber + " " + operator + " " + secondNumber;
          addHistory(firstNumber + " " + operator + " " + secondNumber + " = エラー");
          firstNumber = null;
          operator = null;
          isNewInput = true;
          return;
        }
        result = a / b;
      }

      const resultText = formatNumber(result);
      expression.textContent = firstNumber + " " + operator + " " + secondNumber + " =";
      display.textContent = resultText;
      addHistory(firstNumber + " " + operator + " " + secondNumber + " = " + resultText);
      showStars();
      firstNumber = null;
      operator = null;
      isNewInput = true;
    }

    function clearAll() {
      firstNumber = null;
      operator = null;
      isNewInput = true;
      display.textContent = "0";
      expression.textContent = "計算式";
    }

    function handleTax(mode) {
      if (display.textContent === "エラー") {
        clearAll();
        return;
      }

      const value = parseFloat(display.textContent);

      if (Number.isNaN(value)) {
        return;
      }

      const result = mode === "include" ? value * (1 + taxRate) : value / (1 + taxRate);
      const label = mode === "include" ? "税込" : "税抜";
      const resultText = formatNumber(result);

      expression.textContent = label + " " + display.textContent;
      display.textContent = resultText;
      addHistory(label + " " + value + " = " + resultText);
      showStars();
      firstNumber = null;
      operator = null;
      isNewInput = true;
    }

    function swapCurrencies() {
      const currentFrom = fromCurrency.value;
      fromCurrency.value = toCurrency.value;
      toCurrency.value = currentFrom;
    }

    function convertCurrency() {
      if (display.textContent === "エラー") {
        clearAll();
        return;
      }

      const amount = parseFloat(display.textContent);

      if (Number.isNaN(amount)) {
        return;
      }

      const from = fromCurrency.value;
      const to = toCurrency.value;
      const converted = (amount / currencyRates[from]) * currencyRates[to];
      const resultText = formatCurrencyResult(converted, to);

      expression.textContent = amount + " " + from + " → " + to;
      display.textContent = resultText;
      addHistory(amount + " " + from + " → " + resultText + " " + to);
      showStars();
      firstNumber = null;
      operator = null;
      isNewInput = true;
    }

    document.querySelectorAll("button").forEach(function(button) {
      button.addEventListener("click", function(event) {
        showPressStars(event.currentTarget);
      });
    });

    [baggageLimitInput, baggageCurrentInput].forEach(function(input) {
      input.addEventListener("input", function() {
        calculateBaggage(false);
      });
    });

    calculateBaggage(false);
  </script>
</body>
</html>
